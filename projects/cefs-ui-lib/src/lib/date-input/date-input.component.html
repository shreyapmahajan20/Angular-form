<div class="cefs-field-wrapper">
  <label class="cefs-label" [for]="name">
    {{ label }}
    <span *ngIf="required" class="required-star">*</span>
  </label>

  <div class="cefs-date-wrap">
    <input
      #dateInput
      class="cefs-date-input"
      [class.error]="hasError"
      [id]="name"
      [name]="name"
      type="date"
      [placeholder]="placeholder"
      [value]="value"
      [disabled]="disabled"
      [attr.min]="min"
      [attr.max]="max"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />

    <button
      type="button"
      class="cefs-date-trigger"
      [disabled]="disabled"
      (click)="openDatePicker(dateInput)"
      aria-label="Open calendar"
    >
      <svg class="cefs-date-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="3" width="14" height="12" rx="1.5" stroke="#9E9E9E" stroke-width="1.3" />
        <path d="M1 7h14" stroke="#9E9E9E" stroke-width="1.3" />
        <path d="M5 1v4M11 1v4" stroke="#9E9E9E" stroke-width="1.3" stroke-linecap="round" />
      </svg>
    </button>
  </div>

  <div class="cefs-error" *ngIf="hasError" role="alert" aria-live="polite">
    <span class="error-icon">!</span>
    <span class="error-text">{{ errorMessage }}</span>
  </div>
</div>
