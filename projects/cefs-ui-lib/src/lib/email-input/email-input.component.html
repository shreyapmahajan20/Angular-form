<div class="cefs-field-wrapper" *ngIf="enabledFlag">
  <label class="cefs-label" [for]="name">
    {{ label }}
    <span *ngIf="required" class="required-star">*</span>
    <span *ngIf="showInfo" class="info-icon" [title]="infoTooltip">i</span>
  </label>

  <div class="cefs-input-wrapper">
    <span class="cefs-email-icon" aria-hidden="true">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14.4 0H1.6C0.72 0 0.008 0.72 0.008 1.6L0 10.4C0 11.28 0.72 12 1.6 12H14.4C15.28 12 16 11.28 16 10.4V1.6C16 0.72 15.28 0 14.4 0ZM14.4 3.2L8 7.2L1.6 3.2V1.6L8 5.6L14.4 1.6V3.2Z" fill="#9E9E9E"/>
      </svg>
    </span>
    <input
      class="cefs-input has-icon"
      [class.error]="hasError"
      [id]="name"
      [name]="name"
      type="email"
      [placeholder]="placeholder"
      [value]="value"
      [disabled]="disabled"
      [attr.maxlength]="maxLength || null"
      (input)="onInput($event)"
      (blur)="onBlur()"
      autocomplete="email"
      inputmode="email"
    />
  </div>

  <div class="cefs-error" *ngIf="hasError" role="alert" aria-live="polite">
    <span class="error-icon">!</span>
    <span class="error-text">{{ errorMessage }}</span>
  </div>
</div>
