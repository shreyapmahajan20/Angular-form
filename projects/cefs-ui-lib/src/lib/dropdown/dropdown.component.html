<div class="cefs-field-wrapper">
  <!-- Label -->
  <label class="cefs-label" *ngIf="label">
    {{ label }}
    <span *ngIf="required" class="required-star">*</span>
    <span *ngIf="showInfo" class="info-icon" [title]="infoTooltip">i</span>
  </label>

  <!-- Trigger + Panel -->
  <div class="cefs-dd-inner">
    <div
      class="cefs-dd-trigger"
      [class.open]="isOpen"
      [class.error]="hasError"
      [class.disabled]="disabled"
      (click)="toggleDropdown()"
      [attr.aria-expanded]="isOpen"
      [attr.aria-haspopup]="'listbox'"
      role="combobox"
      tabindex="0"
      (keydown.enter)="toggleDropdown()"
      (keydown.space)="$event.preventDefault(); toggleDropdown()"
    >
      <span class="dd-display-text" [class.placeholder]="selectedValues.length === 0">
        {{ selectedValues.length > 0 ? displayLabel : placeholder }}
      </span>
      <span class="dd-arrow" [class.rotated]="isOpen">
        <svg width="18" height="11" viewBox="0 0 18 11" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1.5 1.5L9 9.5L16.5 1.5" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>

    <!-- Dropdown Panel -->
    <div class="cefs-dd-panel" *ngIf="isOpen" role="listbox" [attr.aria-multiselectable]="!singleSelect">
      <div
        class="cefs-dd-option"
        *ngFor="let option of options"
        [class.selected]="isSelected(option.value)"
        (click)="toggleOption(option)"
        role="option"
        [attr.aria-selected]="isSelected(option.value)"
      >
        <span class="dd-checkbox" [class.checked]="isSelected(option.value)">
          <svg *ngIf="isSelected(option.value)" width="15" height="12" viewBox="0 0 15 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.5 6L5.5 10L13.5 2" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="dd-option-label" [class.bold]="isSelected(option.value)">{{ option.label }}</span>
      </div>
      <div class="dd-empty" *ngIf="options.length === 0">No options available</div>
    </div>
  </div>

  <!-- Error Message -->
  <div class="cefs-error" *ngIf="hasError" role="alert" aria-live="polite">
    <span class="error-icon">!</span>
    <span class="error-text">{{ errorMessage }}</span>
  </div>
</div>
